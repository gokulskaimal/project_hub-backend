<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Invitation to Join {{ORG_NAME}}</title>
    <link rel="stylesheet" href="./styles/inviteMember.css">
</head>
<body >
    <h1 >You're Invited! 🎉</h1>
    <p>{{INVITER_NAME}} has invited you to join <strong>{{ORG_NAME}}</strong> on Project Hub.</p>
    <div >
        <a href="{{INVITE_URL}}" >Accept Invitation</a>
    </div>
    <p>If the button doesn't work, copy and paste this link:</p>
    <p >{{INVITE_URL}}</p>
    <p><strong>This invitation expires in {{EXPIRY}}.</strong></p>
</body>
</html>
